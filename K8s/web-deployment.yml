apiVersion: apps/v1
kind: Deployment
metadata:
  name: notes-webapp
  namespace: default
  labels:
    app: notes-webapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notes-webapp
  template:
    metadata:
      labels:
        app: notes-webapp
    spec:
      containers:
        - name: notes-webapp
          # IMAGE TAG is replaced by Jenkins at build time
          image: abdulwadood001/notes-webapp:latest
          ports:
            - containerPort: 3000
          env:
            - name: PGHOST
              value: "postgres"
            - name: PGUSER
              value: "appuser"
            - name: PGPASSWORD
              value: "apppassword"
            - name: PGDATABASE
              value: "appdb"
            - name: PORT
              value: "3000"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
